<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="VR 180° Side-by-Side video player with interactive look-around controls" />
  <title>VR 180° Video Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Background glow effects -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="5 3 19 12 5 21 5 3" />
        </svg>
        <span class="logo-text">VR VideoPlay</span>
      </div>
    </header>

    <main class="main">
      <!-- Drop zone / file picker -->
      <div id="dropZone" class="drop-zone">
        <div class="drop-zone-content">
          <div class="drop-icon-wrapper">
            <svg class="drop-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="8" y="12" width="48" height="36" rx="4" />
              <polygon points="26 22 42 30 26 38" fill="currentColor" stroke="none" />
              <path d="M32 48 L32 58" stroke-linecap="round" />
              <path d="M24 58 L40 58" stroke-linecap="round" />
            </svg>
          </div>
          <h1 class="drop-title">Drop your VR video here</h1>
          <p class="drop-subtitle">or click to browse files</p>
          <p class="drop-hint">Supports 180° Side-by-Side (SBS) VR videos</p>
          <input type="file" id="fileInput" accept="video/*" hidden />
          <button id="browseBtn" class="browse-btn">
            <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
              <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" />
            </svg>
            Choose File
          </button>

          <div class="url-input-container">
            <div class="url-divider">
              <span class="url-divider-line"></span>
              <span class="url-divider-text">or stream from URL</span>
              <span class="url-divider-line"></span>
            </div>
            <div class="url-input-wrapper">
              <div class="url-input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                  <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                  <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                </svg>
              </div>
              <input type="url" id="videoUrlInput" placeholder="Paste a video URL (e.g., https://example.com/video.mp4)" class="url-input" />
              <button id="playUrlBtn" class="play-url-btn" title="Stream Video">
                <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
                  <polygon points="5 3 19 12 5 21 5 3" />
                </svg>
                <span>Stream</span>
              </button>
            </div>
          </div>

          <section class="history" aria-labelledby="historyTitle">
            <div class="history-header">
              <h2 id="historyTitle">Recently played</h2>
              <button id="clearHistoryBtn" class="clear-history-btn" type="button">Clear</button>
            </div>
            <p id="emptyHistory" class="empty-history">Videos you play will appear here.</p>
            <ul id="historyList" class="history-list" aria-live="polite"></ul>
          </section>
        </div>
      </div>

      <!-- Video player -->
      <div id="playerContainer" class="player-container hidden">
        <div class="player-wrapper" id="playerWrapper">
          <!-- Hidden video element (texture source + audio) -->
          <video id="videoPlayer" playsinline></video>

          <!-- Three.js canvas container -->
          <div id="vrCanvas" class="vr-canvas"></div>

          <!-- Drag hint (fades out) -->
          <div id="dragHint" class="drag-hint hidden">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="22" height="22">
              <path d="M5 12h14M5 12l3-3M5 12l3 3M19 12l-3-3M19 12l-3 3" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span>Drag to look around</span>
          </div>

          <!-- Play/pause indicator -->
          <div id="playPauseIndicator" class="play-pause-indicator">
            <svg id="indicatorPlay" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3" />
            </svg>
            <svg id="indicatorPause" class="hidden" viewBox="0 0 24 24" fill="currentColor">
              <rect x="5" y="3" width="4" height="18" rx="1" />
              <rect x="15" y="3" width="4" height="18" rx="1" />
            </svg>
          </div>

          <!-- Controls -->
          <div id="controls" class="controls">
            <!-- Progress bar -->
            <div id="progressContainer" class="progress-container">
              <div id="progressBuffered" class="progress-buffered"></div>
              <div id="progressFilled" class="progress-filled"></div>
              <div id="progressThumb" class="progress-thumb"></div>
              <div id="progressTooltip" class="progress-tooltip">0:00</div>
            </div>

            <div class="controls-row">
              <div class="controls-left">
                <button id="playPauseBtn" class="control-btn" title="Play / Pause (K)">
                  <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="5 3 19 12 5 21 5 3" />
                  </svg>
                  <svg id="pauseIcon" class="hidden" viewBox="0 0 24 24" fill="currentColor">
                    <rect x="5" y="3" width="4" height="18" rx="1" />
                    <rect x="15" y="3" width="4" height="18" rx="1" />
                  </svg>
                </button>

                <div class="volume-group">
                  <button id="volumeBtn" class="control-btn" title="Mute / Unmute (M)">
                    <svg id="volumeHighIcon" viewBox="0 0 24 24" fill="currentColor">
                      <path d="M11 5L6 9H2v6h4l5 4V5z" />
                      <path d="M15.54 8.46a5 5 0 010 7.07" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <path d="M19.07 4.93a10 10 0 010 14.14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                    <svg id="volumeMuteIcon" class="hidden" viewBox="0 0 24 24" fill="currentColor">
                      <path d="M11 5L6 9H2v6h4l5 4V5z" />
                      <line x1="23" y1="9" x2="17" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="17" y1="9" x2="23" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                  </button>
                  <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="1" />
                </div>

                <span id="timeDisplay" class="time-display">0:00 / 0:00</span>
              </div>

              <div class="controls-right">
                <div class="vr-badge">VR 180°</div>
                <div id="vrButtonContainer" class="vr-button-container"></div>
                <button id="resetViewBtn" class="control-btn" title="Reset View (R)">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 4v6h6" />
                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" />
                  </svg>
                </button>
                <button id="fullscreenBtn" class="control-btn" title="Fullscreen (F)">
                  <svg id="expandIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <polyline points="15 3 21 3 21 9" />
                    <polyline points="9 21 3 21 3 15" />
                    <line x1="21" y1="3" x2="14" y2="10" />
                    <line x1="3" y1="21" x2="10" y2="14" />
                  </svg>
                  <svg id="shrinkIcon" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <polyline points="4 14 10 14 10 20" />
                    <polyline points="20 10 14 10 14 4" />
                    <line x1="14" y1="10" x2="21" y2="3" />
                    <line x1="3" y1="21" x2="10" y2="14" />
                  </svg>
                </button>
                <button id="changeVideoBtn" class="control-btn" title="Change Video">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" />
                    <line x1="12" y1="10" x2="12" y2="14" />
                    <line x1="10" y1="12" x2="14" y2="12" />
                  </svg>
                </button>
                <button id="backToLibraryBtn" class="control-btn" title="Back to video selection (Esc)">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5" />
                    <path d="m12 19-7-7 7-7" />
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="video-info">
          <h2 id="videoName" class="video-name">video.mp4</h2>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
